name: CemuEmulator
options:
  bundleIdPrefix: com.brandon
  deploymentTarget:
    iOS: "16.0"

targets:
  CemuEmulator:
    type: application
    platform: iOS
    deploymentTarget: "16.0"

    sources:
      - path: src/ios

    resources:
      - path: src/ios/Resources
        optional: true

    settings:
      PRODUCT_NAME: CemuEmulator
      PRODUCT_BUNDLE_IDENTIFIER: com.brandon.CemuEmulator
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "1"
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: "NO"
      CODE_SIGNING_ALLOWED: "NO"
      ENABLE_BITCODE: "NO"
      SWIFT_VERSION: "5.9"
      IPHONEOS_DEPLOYMENT_TARGET: "16.0"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

    info:
      path: Info.plist
      properties:
        CFBundleName: "Wii U Emulator"
        CFBundleDisplayName: "Wii U Emulator"
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        MinimumOSVersion: "16.0"

  CemuEmulatorTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"

    sources:
      - path: src/iosTests

    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.brandon.CemuEmulatorTests
      SWIFT_VERSION: "5.9"
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: "NO"
      CODE_SIGNING_ALLOWED: "NO"

    dependencies:
      - target: CemuEmulator
