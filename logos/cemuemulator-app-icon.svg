<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <title>Wii U iOS Emulator App Icon</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#0F3D91"/>
    </linearGradient>
    <linearGradient id="padSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- gamepad silhouette, centered in an ~80% safe area -->
  <g transform="translate(256 262)">
    <!-- pad body: rounded bar with two bulged grips -->
    <path
      d="M -168 -18
         C -168 -66 -132 -96 -84 -96
         L 84 -96
         C 132 -96 168 -66 168 -18
         L 168 26
         C 168 74 132 100 96 100
         C 70 100 54 88 40 62
         L 26 36
         C 18 22 10 16 0 16
         C -10 16 -18 22 -26 36
         L -40 62
         C -54 88 -70 100 -96 100
         C -132 100 -168 74 -168 26
         Z"
      fill="#FFFFFF"/>

    <!-- sheen -->
    <path
      d="M -168 -18
         C -168 -66 -132 -96 -84 -96
         L 84 -96
         C 132 -96 168 -66 168 -18
         L 168 10
         L -168 10
         Z"
      fill="url(#padSheen)"/>

    <!-- left d-pad -->
    <g fill="#0F3D91">
      <rect x="-124" y="-44" width="24" height="72" rx="6"/>
      <rect x="-148" y="-20" width="72" height="24" rx="6"/>
    </g>

    <!-- right face buttons -->
    <g fill="#0F3D91">
      <circle cx="100" cy="-44" r="15"/>
      <circle cx="132" cy="-12" r="15"/>
      <circle cx="68" cy="-12" r="15"/>
      <circle cx="100" cy="20" r="15"/>
    </g>

    <!-- center notch (nod to the Wii U's off-center touchpad silhouette) -->
    <circle cx="0" cy="-30" r="14" fill="#0F3D91"/>
  </g>
</svg>
