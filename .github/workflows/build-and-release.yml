name: Build IPA and Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    name: Build IPA

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Display Xcode version
      run: xcodebuild -version

    - name: Install XcodeGen
      run: |
        brew install xcodegen
        xcodegen --version

    - name: Generate Xcode project
      run: |
        cd ${{ github.workspace }}
        xcodegen generate

    - name: Build Archive (A-chip ARM64)
      run: |
        xcodebuild \
          -project CemuEmulator.xcodeproj \
          -scheme CemuEmulator \
          -configuration Release \
          -sdk iphoneos \
          -arch arm64 \
          -derivedDataPath build \
          -archivePath build/CemuEmulator.xcarchive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          archive

    - name: Create IPA from Archive
      run: |
        mkdir -p build/ipa/Payload
        find build/CemuEmulator.xcarchive -name "CemuEmulator.app" -type d -exec cp -r {} build/ipa/Payload/ \;
        cd build/ipa
        zip -r CemuEmulator-a-chip.ipa Payload/
        ls -lh *.ipa
        cd ../..
        ls -lh build/ipa/

    - name: Generate Release Notes
      id: release_notes
      run: |
        VERSION="${{ github.ref_name }}"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        {
          echo "message<<COMMITMSG_EOF"
          git log -1 --pretty=%B
          echo "COMMITMSG_EOF"
        } >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: "Muffin Emulator ${{ steps.release_notes.outputs.version }}"
        tag_name: ${{ github.ref_name }}
        body: |
          # Muffin Emulator Release

          ## Version
          ${{ steps.release_notes.outputs.version }}

          ## What's Included
          ✅ PowerPC CPU Interpreter with optional loop-caching JIT (auto-tunes for A-series chips)
          ✅ 256 MB emulated memory, address-space rebased to the Wii U's real 0x8000_0000+ effective range
          ✅ Metal GPU Pipeline (8 shaders)
          ✅ 20 Professional Controller Skins, organized by console type
          ✅ In-app ROM upload (Files/iCloud picker), rename, custom cover art, batch delete
          ✅ Favorites, Recently Added / Recently Played / Favorites-first sorting - all persisted across launches
          ✅ Settings screen with JIT on/off toggle and live compile stats
          ✅ Dark Theme UI throughout, including native pickers/sheets

          This is an actively evolving interpreter, not a finished, benchmarked emulator - see
          "Known Limitations" below before expecting real games to run.

          ## Installation

          ### Method 1: AltStore (Easiest)
          1. Download AltStore from altstore.io
          2. Open CemuEmulator-a-chip.ipa with AltStore
          3. Install to your device (auto-renews weekly)

          ### Method 2: Apple Configurator 2
          1. Connect device to Mac
          2. Configurator 2 → Add → CemuEmulator-a-chip.ipa
          3. Install automatically

          ### Method 3: Xcode (If building locally)
          1. Build as per BUILD_AND_DEPLOY.md
          2. Xcode runs directly to device

          ## Adding Games

          **In-app (recommended):** Tap the upload icon in the game browser header (or the
          "Upload ROM" button in the empty-library state) and pick a `.wua`, `.wud`, `.rpx`,
          or `.iso` file from Files, iCloud Drive, or any other document provider.

          **Manually via Files app:** On My iPhone/iPad → CemuEmulator → Documents, create a
          `Roms` folder and drop files in directly, then pull down on the game grid to rescan.

          ## Playing

          1. Launch app
          2. Browse games in grid - search, sort (Name/Recently Added/Recently Played/Favorites), or long-press a card for Rename/Set Cover/Delete
          3. Tap Play
          4. Tap the controller icon (🎮) to change controller skin - your choice is remembered next launch
          5. Use D-Pad and ABXY buttons to play

          ## Controller Skins (20 Total)

          ### Wii U Category
          - Standard (default)
          - Wii U Original (authentic)
          - Custom (customizable)

          ### GameCube Category
          - GameCube (classic)

          ### Nintendo 64 Category
          - Nintendo 64 (retro)

          ### SNES Category
          - Super Nintendo (classic)

          ### NES Category
          - NES (minimal)

          ### Switch Pro Category
          - Switch Pro (modern)

          ### PlayStation Category
          - PlayStation (PS colors)

          ### Xbox Category
          - Xbox (Xbox styling)

          ### Steam Deck Category
          - Steam Deck (PC gaming)

          ### Arcade Category
          - Arcade Cabinet (bright)
          - Sega Genesis (retro)

          ### Modern/Minimalist Category
          - Minimal (pure minimalist)
          - Glass (frosted glass)
          - Neon (cyberpunk)
          - Dark Mode (OLED optimized)
          - Light Mode (bright)

          ### Game-Themed Category
          - Mario Theme
          - Zelda Theme

          ## Known Limitations

          - The PowerPC interpreter implements only a subset of real opcodes; most are still
            stubs. Don't expect commercial games to boot yet - this release is about the app
            shell, library management, and emulation *infrastructure* being solid.
          - No FPS/battery/memory numbers are published here because none have been measured
            against real game code on real hardware. Treat any number you see elsewhere in
            this repo's older docs as aspirational, not measured.
          - GPU command translation (actual Wii U graphics → Metal) isn't implemented yet;
            the render path currently displays a cleared frame.

          ## Under the Hood (this release cycle)

          ✅ Unit test target added (MemoryManager/JITEngine/CPUCore) - first automated tests in the project
          ✅ Fixed a real bug where the CPU's address space and the memory backing store didn't
             line up, so loaded ROM bytes were never actually reachable by the CPU
          ✅ Fixed taken branches not actually changing the program counter

          ## Documentation

          See included guides:
          - BUILD_AND_DEPLOY.md (build steps)
          - CONTROLLER_SKINS_GUIDE.md (20 skins reference)
          - iOS_OPTIMIZATION_GUIDE.md (performance tuning)
          - DEPLOYMENT_GUIDE.md (architecture & troubleshooting)

          ## Repository

          GitHub: https://github.com/bward-dev1/cemu-ios-a-chip

          ${{ steps.release_notes.outputs.message }}

          ---

          **A Wii U emulation project actively under development on iOS.**
        files: |
          build/ipa/CemuEmulator-a-chip.ipa
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CemuEmulator-iOS-IPA
        path: build/ipa/CemuEmulator-a-chip.ipa
        retention-days: 90
